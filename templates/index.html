<!DOCTYPE html>
<html>

<head>

    <title>Mobile Shop Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            font-family:Arial;
            margin:40px;
            background:#f5f5f5;
            text-align:center;
        }

        h1{
            color:#333;
        }

        .chart-container{
            width:900px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.15);
        }

    </style>

</head>

<body>

<h1>📱 Mobile Shop Sales Dashboard</h1>

<div class="chart-container">

<canvas id="salesChart"></canvas>

</div>

<script>

const brands = {{ brands|safe }};
const totals = {{ totals|safe }};

new Chart(document.getElementById("salesChart"), {

    type: 'bar',

    data: {

        labels: brands,

        datasets: [{
            label: "Total Sales (₹)",
            data: totals,
            borderWidth:1
        }]

    },

    options:{

        responsive:true,

        plugins:{
            legend:{
                display:true
            }
        }

    }

});

</script>

<hr style="margin-top:50px;">

<a href="/customers"
   style="
      font-size:20px;
      text-decoration:none;
      color:white;
      background:#007BFF;
      padding:12px 25px;
      border-radius:8px;">
    View Customer Details
</a>

</body>
</html>
